name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: 1.26.1
  GOTOOLCHAIN: go1.26.1

jobs:
  common:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/common
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Go test
        run: go test ./...

  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Go test
        run: go test ./...
      - name: Go test (race)
        run: go test -race ./...
      - name: Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26.1'
          work-dir: gateway

  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/smoke
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Go test
        run: go test ./...